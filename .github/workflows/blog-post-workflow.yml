name: Update README with latest blog posts

on:
  schedule:
    - cron: '0 6 1 * *'   # Runs on the 1st of every month at 06:00 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    name: Fetch posts from WP JSON API and update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch posts and update README
        env:
          WP_API: "https://atlasgondal.com/wp-json/wp/v2/posts?per_page=5&_fields=title,link,date&orderby=date&order=desc"
        run: |
          python3 - <<'PYEOF'
          import urllib.request
          import json
          import re
          from datetime import datetime

          url = "${{ env.WP_API }}"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0 (GitHub Actions)"})

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  posts = json.loads(resp.read())
          except Exception as e:
              print(f"Failed to fetch posts: {e}")
              exit(1)

          lines = []
          for post in posts:
              title = post["title"]["rendered"]
              link  = post["link"]
              date  = datetime.strptime(post["date"], "%Y-%m-%dT%H:%M:%S").strftime("%b %d, %Y")
              lines.append(f"- [{title}]({link}) — {date}")

          block = "\n".join(lines)

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          updated = re.sub(
              r"(<!-- BLOG-POST-LIST:START -->).*?(<!-- BLOG-POST-LIST:END -->)",
              f"<!-- BLOG-POST-LIST:START -->\n{block}\n<!-- BLOG-POST-LIST:END -->",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)

          print("README updated successfully.")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update README with latest blog posts" &&
            git push
          )
